<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page | Github-Issue-Tracker</title>

    <!-- Font-awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind+Daisyui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google-Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <header>
      <div
        class="navbar flex items-center justify-between bg-base-100 shadow-sm"
      >
        <div class="flex items-center gap-3 pl-20">
          <img class="w-10" src="images/github-logo.png" alt="" />
          <p>GitHub Issues Tracker</p>
        </div>
        <div class="flex gap-4 pr-20">
          <!-- Search  -->
          <div>
            <label class="input">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input type="search" required placeholder="Search Issues..." />
            </label>
          </div>
          <!-- button  -->
          <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>
            New Issue
          </button>
        </div>
      </div>
    </header>
    <!-- toggle-section  -->
    <section class="max-w-7xl mx-auto px-6 pt-15">
      <div class="bg-white border border-gray-100 rounded-xl shadow-sm p-6">
        <div class="flex items-center gap-2">
          <button id="btn-all" class="btn btn-primary px-10 py-2">All</button>

          <button id="btn-open" class="btn btn-white px-8 py-2">Open</button>

          <button id="btn-closed" class="btn btn-white px-8 py-2">
            Closed
          </button>
        </div>
      </div>
    </section>
    <!-- 50 Issues-section  -->
    <section class="max-w-7xl mx-auto px-6 pt-0">
      <div class="mt-6 bg-white border border-gray-100 rounded-xl shadow-sm">
        <div class="flex items-center justify-between p-6">
          <div class="flex items-center gap-4">
            <div
              class="flex items-center justify-center w-12 h-12 rounded-full bg-indigo-50 text-[#4F16F0]"
            >
              <img src="images/Aperture.png" alt="" />
            </div>

            <div>
              <h2
                id="issue-count"
                class="text-xl font-bold text-slate-900 leading-tight"
              ></h2>
              <p class="text-sm text-slate-500">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
              <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
              <span class="text-sm font-medium text-slate-700">Open</span>
            </div>

            <div class="flex items-center gap-2">
              <span class="w-2.5 h-2.5 rounded-full bg-[#4F16F0]"></span>
              <span class="text-sm font-medium text-slate-700">Closed</span>
            </div>
          </div>
        </div>

        <div class="border-t border-gray-100"></div>
      </div>
    </section>
    <!-- Card-section  -->
    <section
      id="issues-card"
      class="max-w-[1230px] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 px-6 py-4 border-x-gray-200 border-x"
    ></section>
