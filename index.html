<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment-5 | Github-Issue-Tracker | Zaid</title>

    <!-- Font-awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind+Daisyui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google-Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div
      class="bg-white p-8 rounded-xl shadwo-sm border border-gray-100 w-full max-w-[456px]"
    >
      <div class="flex flex-col items-center mb-6">
        <img class="mb-6" src="images/github-logo.png" alt="" />
        <h2 class="font-semibold text-2xl tracking-tight">
          GitHub Issues Tracker
        </h2>
        <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
      </div>

      <div>
        <fieldset class="fieldset">
          <legend class="fieldset-legend font-medium text-[16px]">
            Username
          </legend>
          <!-- Username   -->
          <input
          id="input-username"
            type="text"
            class="input w-full rounded-lg"
            placeholder="Enter Username"
          />
          <p class="label block text-[12px] font-medium text-[#4A00FF]">
            Default: admin
          </p>
        </fieldset>
        <fieldset class="fieldset">
          <legend class="fieldset-legend font-medium text-[16px]">
            Password
          </legend>
          <!-- Password   -->
          <input
          id="input-password"
            type="text"
            class="input w-full rounded-lg"
            placeholder="Enter Password"
          />
          <p class="label text-[12px] font-medium text-[#4A00FF]">
            Default: admin123
          </p>
        </fieldset>
      </div>
      <!-- button  -->
      <button id="login-btn" class="btn btn-primary w-full rounded-lg mt-6">Sign In</button>

      <div class="divider">OR</div>

      <div class="text-center">
        <p class="text-slate-500 text-sm mb-3">Demo Credentials:</p>
        <div class="bg-slate-50 rounded-xl py-6 px-4 border border-gray-100/50">
          <p class="text-slate-800 font-bold text-base">
            Username: <span class="font-medium text-slate-600">admin</span>
          </p>
          <p class="text-slate-800 font-bold text-base">
            Password: <span class="font-medium text-slate-600">admin123</span>
          </p>
        </div>
      </div>
    </div>

    <script src="scripts/login.js"></script>
  </body>
</html>
